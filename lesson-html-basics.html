      <section class="card">
        <h2>最小テンプレート</h2>
        <pre><code>&lt;!doctype html&gt;
&lt;html lang="ja"&gt;
  &lt;head&gt;
    &lt;meta charset="UTF-8" /&gt;
    &lt;title&gt;ページタイトル&lt;/title&gt;
  &lt;/head&gt;
  &lt;body&gt;

  &lt;/body&gt;
&lt;/html&gt;</code></pre>
      </section>

      <section class="card">
        <h2>練習問題</h2>
        <ol>
          <li><code>&lt;h1&gt;</code> と <code>&lt;p&gt;</code> を1つずつ書く</li>
          <li>ページタイトルを自分の名前にする</li>
        </ol>
      </section>

      <section class="card playground" data-html="<h1>はじめてのHTML</h1><p>ここに自己紹介を書いてみよう。</p>">

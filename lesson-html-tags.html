      <section class="card">
        <h2>タグ別の使い方</h2>
        <ul>
          <li><code>&lt;h1&gt;～&lt;h3&gt;</code>: 見出し</li>
          <li><code>&lt;p&gt;</code>: 段落</li>
          <li><code>&lt;a href="..."&gt;</code>: リンク</li>
          <li><code>&lt;img src="..." alt="..." /&gt;</code>: 画像</li>
          <li><code>&lt;ul&gt;&lt;li&gt;</code>: 箇条書き</li>
        </ul>
      </section>

      <section class="card">
        <h2>練習問題</h2>
        <ol>
          <li>見出し、段落、リンク、リストを1回ずつ使う</li>
          <li>画像タグに <code>alt</code> を必ずつける</li>
        </ol>
      </section>
